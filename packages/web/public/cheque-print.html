<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Cheque</title>
    <style>
        @page {
            margin: 0;
            size: auto;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .cheque-container {
            position: relative;
            background: #ffffff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin: 20px;
        }
        .cheque-field {
            position: absolute;
            overflow: hidden;
            white-space: pre-wrap;
        }
        @media print {
            body {
                background: white;
                display: block;
            }
            .cheque-container {
                box-shadow: none;
                margin: 0;
                page-break-after: avoid;
            }
        }
    </style>
</head>
<body>
    <div id="cheque-root"></div>
    
    <script>
        // Wait for data from parent window - ignore unrelated messages (extensions send theirs)
        window.addEventListener('message', function(event) {
            // Only accept messages that include our marker
            const data = event.data;
            if (!data || data.__chequePrint !== true) {
                // ignore unrelated messages
                return;
            }

            const template = data.template;
            const payload = data.payload;

            if (!template || !payload) {
                const root = document.getElementById('cheque-root');
                if (root) {
                    root.innerHTML = '<div style="padding: 20px; text-align: center;">Invalid cheque data received.</div>';
                } else {
                    // last resort
                    document.body.innerHTML = '<div style="padding: 20px; text-align: center;">Invalid cheque data received.</div>';
                }
                return;
            }

            try {
                renderCheque(template, payload);
            } catch (err) {
                console.error('Failed to render cheque in print window', err);
                const root = document.getElementById('cheque-root');
                if (root) root.innerHTML = '<div style="padding: 20px; text-align: center;">Failed to render cheque.</div>';
                return;
            }

            // Auto-trigger print after a short delay to ensure rendering is complete
            setTimeout(function() {
                window.print();
            }, 500);
        }, false);
        
        function mmToPx(mm, dpi) {
            return (mm / 25.4) * dpi;
        }
        
        function formatValue(key, payload, settings) {
            switch(key) {
                case 'payee_name':
                case 'payee':
                    return payload.payee_name || '';
                case 'cheque_date':
                case 'date':
                    return formatDate(payload.cheque_date, settings.dateFormat || 'MMMM DD, YYYY');
                case 'amount':
                case 'amount_numeric':
                    return formatAmount(payload.amount_numeric, settings);
                case 'amount_words':
                case 'amountInWords':
                    return payload.amount_in_words || '';
                case 'memo':
                    return payload.memo || '';
                case 'cheque_number':
                case 'chequeNumber':
                    return payload.cheque_number || '';
                default:
                    return '';
            }
        }
        
        function formatDate(dateValue, format) {
            if (!dateValue) return '';
            var date = new Date(dateValue);
            if (isNaN(date.getTime())) return '';
            
            var day = date.getDate().toString().padStart(2, '0');
            var monthIndex = date.getMonth();
            var year = date.getFullYear();
            
            var months = ['January', 'February', 'March', 'April', 'May', 'June',
                          'July', 'August', 'September', 'October', 'November', 'December'];
            var shortMonths = months.map(function(m) { return m.slice(0, 3); });
            
            var replacements = {
                'YYYY': year,
                'YY': String(year).slice(-2),
                'MMMM': months[monthIndex],
                'MMM': shortMonths[monthIndex],
                'MM': (monthIndex + 1).toString().padStart(2, '0'),
                'M': monthIndex + 1,
                'DD': day,
                'D': parseInt(day, 10)
            };
            
            var formatted = format;
            for (var token in replacements) {
                formatted = formatted.replace(new RegExp(token, 'g'), replacements[token]);
            }
            return formatted;
        }
        
        function formatAmount(amount, settings) {
            var n = Number(amount || 0);
            var decimals = settings.decimals !== undefined ? settings.decimals : 2;
            var formatted = n.toLocaleString('en-PH', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals,
                useGrouping: settings.useThousandsSeparator !== false
            });
            var symbol = settings.currencySymbol || '';
            if (!symbol) return formatted;
            return settings.showCurrencyAfter ? (formatted + ' ' + symbol) : (symbol + formatted);
        }
        
        function renderCheque(template, payload) {
            // Use mm units for both screen preview and print @page so sizes match exactly
            var settings = template.settings || {};

            var paperW = Number(template.paper_width_mm || 203.2);
            var paperH = Number(template.paper_height_mm || 76.2);
            var marginTop = Number(template.margin_top_mm || 0);
            var marginLeft = Number(template.margin_left_mm || 0);

            var container = document.createElement('div');
            container.className = 'cheque-container';
            // Size the container in millimeters so CSS @page and on-screen preview match
            container.style.width = paperW + 'mm';
            container.style.height = paperH + 'mm';
            container.style.margin = marginTop + 'mm auto 0 auto';
            // center using calc: 50% - half width + left margin
            container.style.marginLeft = 'calc(50% - ' + (paperW / 2) + 'mm + ' + marginLeft + 'mm)';

            var elements = template.elements || [];
            elements.forEach(function(element) {
                var field = document.createElement('div');
                field.className = 'cheque-field';

                // Use mm units for position and size
                var x = (element.x_mm || 0);
                var y = (element.y_mm || 0);
                var width = (element.width_mm || 40);
                var height = (element.height_mm || 10);

                field.style.left = x + 'mm';
                field.style.top = y + 'mm';
                field.style.width = width + 'mm';
                field.style.height = height + 'mm';
                field.style.fontFamily = element.fontFamily || 'Arial, sans-serif';
                field.style.fontSize = (element.fontSizePt || 12) + 'pt';
                field.style.fontWeight = element.fontWeight || 'normal';
                field.style.fontStyle = element.fontStyle || 'normal';
                field.style.textAlign = element.textAlign || 'left';
                field.style.lineHeight = element.lineHeight || 1.2;
                field.style.textTransform = element.textTransform || (element.uppercase ? 'uppercase' : 'none');
                field.style.letterSpacing = (element.letterSpacing || 0) + 'pt';

                var value = formatValue(element.key, payload, settings);
                if (element.uppercase && !element.textTransform) {
                    value = value.toUpperCase();
                }
                field.textContent = value;

                container.appendChild(field);
            });

            var root = document.getElementById('cheque-root');
            if (root) {
                // Clear any previous content
                root.innerHTML = '';
                root.appendChild(container);
            } else {
                document.body.appendChild(container);
            }

            // Update page size for print (in mm). This ensures the printed page matches the cheque size.
            var style = document.createElement('style');
            style.textContent = '@page { size: ' + paperW + 'mm ' + paperH + 'mm; margin: 0; }';
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
