# Define the services (containers) for your application
services:
  
  # --- Database Service ---
  db:
    image: postgres:15-alpine 
    container_name: forson_db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: forson_business_suite
      TZ: Asia/Manila
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - ./database/initial_schema.sql:/docker-entrypoint-initdb.d/01_initial_schema.sql:ro
    ports:
      - "5432:5432"

  # --- NEW: Meilisearch Service ---
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: forson_meilisearch
    restart: always
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"

  # --- Backend API Service ---
  backend:
    container_name: forson_backend
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    image: kentonel/forson-backend:latest
    restart: always
    depends_on:
      - db
      - meilisearch # Added dependency
    ports:
      - "3001:3001"
    env_file:
      - ./.env

  # --- Frontend Service ---
  frontend:
    container_name: forson_frontend
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    image: kentonel/forson-frontend:latest
    restart: always
    depends_on:
      - backend 
    ports:
      - "8090:80"
    volumes:
      - ./mobile-builds:/usr/share/nginx/html/downloads

  # --- Backup Service ---
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: forson_backup
    restart: always
    depends_on:
      - db
    volumes:
      - ./backups:/backups
      - type: bind
        source: ./backup
        target: /scripts
        read_only: true
    environment:
      - DB_HOST=db
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - BACKUP_PATH=/backups
    command: >
      /bin/sh -c "
      cp /scripts/run.sh /tmp/run.sh &&
      cp /scripts/backup.sh /tmp/backup.sh &&
      chmod +x /tmp/run.sh /tmp/backup.sh &&
      /tmp/run.sh
      "

# Define a named volume to persist the PostgreSQL data and Meilisearch data
volumes:
  postgres_data:
  meili_data: