x-logging: &default-logging
  options:
    max-size: "10m"
    max-file: "3"
  driver: json-file

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: forson_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: forson_business_suite
      POSTGRES_USER: ${DB_USER}
      TZ: Asia/Manila
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  meilisearch:
    image: getmeili/meilisearch:v1.3.5
    container_name: forson_meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    ports:
      - "7700:7700"
    logging: *default-logging

  backend:
    image: ${DOCKER_REGISTRY:-kentonel}/forson-backend:${TAG:-latest}
    container_name: forson_backend
    restart: unless-stopped
    depends_on:
      - db
      - meilisearch
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - ./database/migrations:/usr/database/migrations:ro
      - backup_data:/backups
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  frontend:
    image: ${DOCKER_REGISTRY:-kentonel}/forson-frontend:${TAG:-latest}
    container_name: forson_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8090:80"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./mobile-builds:/usr/share/nginx/html/downloads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: forson_backup
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - backup_data:/backups
      - type: bind
        source: ./backup
        target: /scripts
        read_only: true
    environment:
      # No POSTGRES_* vars — we are not running a local PostgreSQL instance
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_PATH: /backups
      TZ: Asia/Manila

    command: >
      /bin/sh -c "
      cp /scripts/run.sh /tmp/run.sh &&
      cp /scripts/backup.sh /tmp/backup.sh &&
      chmod +x /tmp/run.sh /tmp/backup.sh &&
      /tmp/run.sh
      "
    healthcheck:
      # Healthy if at least one backup file was created within the last 25 hours
      test: ["CMD", "sh", "-c", "find /backups -name '*.sql.gz' -mmin -1500 | grep -q ."]
      interval: 1h
      timeout: 10s
      retries: 3
      start_period: 5m
    logging: *default-logging

volumes:
  postgres_data:
    name: forson_postgres_data
  meili_data:
    name: forson_meili_data
  backup_data:
    name: forson_backup_data

networks:
  default:
    name: forson_network
